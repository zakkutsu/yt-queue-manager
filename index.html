<!DOCTYPE html>
<html>
<head>
  <title>YT Queue</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    button {
      padding: 8px 15px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background: #007bff;
      color: white;
      font-weight: bold;
    }
    button:hover {
      background: #0056b3;
    }
    #subscribe-status {
      font-size: 16px;
      font-weight: bold;
      margin: 10px 0;
      padding: 10px;
      border-radius: 4px;
      background: #e9ecef;
    }
    .button-group {
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h2>YouTube Channel Queue</h2>

  <textarea id="input" rows="10" style="width:100%" placeholder="paste link per baris"></textarea>

  <br><br>

  <div class="button-group">
    <button onclick="addLinks()">Tambah</button>
    <button onclick="startQueue()">START</button>
    <button onclick="openNext()">NEXT</button>
    <button onclick="clearQueue()">CLEAR</button>
    <button onclick="stopQueue()">STOP</button>
    <button onclick="restartQueue()">RESTART</button>
    <button onclick="resetIndex()">RESET KE AWAL</button>
  </div>

  <div class="button-group">
    <button onclick="checkSubscribe()" style="background: #28a745;">CHECK SUBSCRIBE</button>
    <button onclick="autoSubscribe()" style="background: #dc3545;">🤖 AUTO SUBSCRIBE</button>
  </div>

  <div id="subscribe-status" style="display: none;"></div>

  <h3>Queue</h3>
  <ul id="list"></ul>

  <script src="renderer.js"></script>
</body>
</html>
